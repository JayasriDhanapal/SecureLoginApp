name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────────────────────────────
  # STAGE 1 — Secret Scanning with Gitleaks
  # Runs immediately on push, before any build.
  # Detects hardcoded API keys, passwords, and tokens in source code.
  # Must run first: a secret committed to git history is permanent.
  # ─────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Full history needed for Gitleaks

      - name: Run Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf gitleaks_8.24.3_linux_x64.tar.gz
          ./gitleaks detect --source=. --no-git --report-format=sarif --report-path=gitleaks-report.sarif --exit-code=1 -v
        continue-on-error: true

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif

  # ─────────────────────────────────────────────────────────────────
  # STAGE 2 — SAST + SCA with SpotBugs and OWASP Dependency-Check
  # Runs during the Maven build phase once code exists.
  # SpotBugs: static analysis for insecure code patterns (SQL injection, etc.)
  # OWASP:    scans declared dependencies against the NVD CVE database.
  # Both run at build time — earliest point the full source + dependency
  # tree is available without needing a deployed environment.
  # ─────────────────────────────────────────────────────────────────
  sast-sca:
    name: SAST + SCA (SpotBugs + OWASP)
    runs-on: ubuntu-latest
    needs: secret-scan            # Run after secret scan completes

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run SpotBugs (SAST)
        run: mvn compile spotbugs:check --batch-mode --no-transfer-progress
        continue-on-error: true

      - name: Run OWASP Dependency-Check (SCA)
        run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=11 --batch-mode --no-transfer-progress
        continue-on-error: true

      - name: Upload SpotBugs report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: target/spotbugs/

      - name: Upload OWASP Dependency-Check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: target/
          if-no-files-found: warn
